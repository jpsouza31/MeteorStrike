<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="120" height="180">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#FFE000" stop-opacity="1"/>
      <stop offset="55%" stop-color="#FF7A00" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF3300" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="innerFlame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FFF176" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9E9E9E"/>
      <stop offset="50%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#9E9E9E"/>
    </linearGradient>
    <linearGradient id="hullGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BDBDBD"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#BDBDBD"/>
    </linearGradient>
    <linearGradient id="wingGradL" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="wingGradR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <radialGradient id="cockpitGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#E1BEE7"/>
      <stop offset="40%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </radialGradient>
    <radialGradient id="glareGrad" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="flameGlow" x="-50%" y="-20%" width="200%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- FLAME - slightly wider/shorter flicker variant -->
  <path d="M47,120 Q42,138 45,154 Q49,166 54,173 Q57,177 60,179 Q63,177 66,173 Q71,166 75,154 Q78,138 73,120 Q66,129 60,130 Q54,129 47,120Z"
        fill="url(#flameGrad)" filter="url(#flameGlow)"/>
  <path d="M52,120 Q49,135 51,149 Q54,160 57,166 Q58.5,170 60,172 Q61.5,170 63,166 Q66,160 69,149 Q71,135 68,120 Q64,126 60,127 Q56,126 52,120Z"
        fill="url(#innerFlame)"/>
  <!-- Wing mini flames - slightly taller this frame -->
  <ellipse cx="26" cy="115" rx="3.5" ry="8" fill="#FF9800" opacity="0.8" filter="url(#flameGlow)"/>
  <ellipse cx="94" cy="115" rx="3.5" ry="8" fill="#FF9800" opacity="0.8" filter="url(#flameGlow)"/>

  <!-- SHIP -->
  <g filter="url(#shadow)">
    <path d="M34,75 L14,100 L18,108 L36,95 L38,80Z" fill="url(#wingGradL)" stroke="#C62828" stroke-width="0.8"/>
    <path d="M30,80 L16,100 L19,103 L33,84Z" fill="#FF8A80" opacity="0.4"/>
    <path d="M14,100 L18,108 L20,105 L16,98Z" fill="#B71C1C"/>
    <path d="M86,75 L106,100 L102,108 L84,95 L82,80Z" fill="url(#wingGradR)" stroke="#C62828" stroke-width="0.8"/>
    <path d="M90,80 L104,100 L101,103 L87,84Z" fill="#FF8A80" opacity="0.4"/>
    <path d="M106,100 L102,108 L100,105 L104,98Z" fill="#B71C1C"/>
    <path d="M60,18 C72,18 80,28 82,42 L84,95 C78,100 70,103 60,104 C50,103 42,100 36,95 L38,42 C40,28 48,18 60,18Z" fill="url(#hullGrad)" stroke="#BDBDBD" stroke-width="1"/>
    <path d="M60,50 C66,50 70,54 71,60 L72,92 C68,95 64,96 60,96 C56,96 52,95 48,92 L49,60 C50,54 54,50 60,50Z" fill="url(#bodyGrad)" stroke="#757575" stroke-width="0.8"/>
    <path d="M38,55 L43,90 L48,92 L49,60 Q46,52 40,52Z" fill="#ECEFF1" opacity="0.5"/>
    <path d="M82,55 L77,90 L72,92 L71,60 Q74,52 80,52Z" fill="#ECEFF1" opacity="0.5"/>
    <path d="M60,18 C65,18 70,22 72,28 L68,34 Q64,30 60,30 Q56,30 52,34 L48,28 C50,22 55,18 60,18Z" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.8"/>
    <ellipse cx="60" cy="44" rx="11" ry="13" fill="url(#cockpitGrad)" stroke="#6A1B9A" stroke-width="1.2"/>
    <ellipse cx="56" cy="40" rx="5" ry="5" fill="url(#glareGrad)"/>
    <rect x="50" y="100" width="20" height="8" rx="3" fill="#757575" stroke="#616161" stroke-width="0.8"/>
    <ellipse cx="60" cy="108" rx="8" ry="3.5" fill="#424242"/>
    <ellipse cx="60" cy="108" rx="5" ry="2" fill="#FF6F00" opacity="0.9"/>
    <rect x="20" y="101" width="12" height="5" rx="2" fill="#757575" stroke="#616161" stroke-width="0.6"/>
    <ellipse cx="26" cy="106" rx="4" ry="1.5" fill="#424242"/>
    <rect x="88" y="101" width="12" height="5" rx="2" fill="#757575" stroke="#616161" stroke-width="0.6"/>
    <ellipse cx="94" cy="106" rx="4" ry="1.5" fill="#424242"/>
    <line x1="54" y1="65" x2="52" y2="90" stroke="#BDBDBD" stroke-width="0.7" opacity="0.6"/>
    <line x1="66" y1="65" x2="68" y2="90" stroke="#BDBDBD" stroke-width="0.7" opacity="0.6"/>
    <line x1="45" y1="72" x2="75" y2="72" stroke="#BDBDBD" stroke-width="0.5" opacity="0.5"/>
    <path d="M39,62 L43,62 L43,78 L39,77Z" fill="#F44336" opacity="0.8"/>
    <path d="M77,62 L81,62 L81,77 L77,78Z" fill="#F44336" opacity="0.8"/>
  </g>
</svg>
