<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="meteorGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#D4A96A"/>
      <stop offset="30%" stop-color="#A0714A"/>
      <stop offset="65%" stop-color="#7A4F2E"/>
      <stop offset="100%" stop-color="#4A2E14"/>
    </radialGradient>
    <radialGradient id="craterGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#5C3A1E"/>
      <stop offset="100%" stop-color="#3A2010"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#FF6600" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Main rock body -->
  <path d="M40,6 C52,5 62,10 68,20 C75,31 74,45 68,55 C62,65 50,73 38,72 C26,71 16,63 11,52 C5,40 7,25 15,16 C22,8 30,7 40,6Z"
        fill="url(#meteorGrad)" filter="url(#glow)"/>

  <!-- Rock surface texture / dark patches -->
  <path d="M30,15 C34,13 40,14 42,18 C38,19 33,18 30,15Z" fill="#5C3A1E" opacity="0.7"/>
  <path d="M50,22 C55,20 60,24 59,28 C55,27 50,26 50,22Z" fill="#5C3A1E" opacity="0.6"/>
  <path d="M20,40 C18,35 22,30 26,31 C25,35 22,39 20,40Z" fill="#4A2E14" opacity="0.7"/>
  <path d="M55,50 C60,47 65,51 63,56 C59,55 54,54 55,50Z" fill="#4A2E14" opacity="0.6"/>
  <path d="M35,58 C38,55 44,56 44,61 C40,61 36,61 35,58Z" fill="#5C3A1E" opacity="0.65"/>

  <!-- Craters -->
  <ellipse cx="36" cy="26" rx="7" ry="6" fill="url(#craterGrad)" opacity="0.85"/>
  <ellipse cx="37" cy="25" rx="4" ry="3.5" fill="#3A2010" opacity="0.6"/>
  <ellipse cx="38" cy="24" rx="2" ry="1.5" fill="#7A5030" opacity="0.4"/>

  <ellipse cx="55" cy="40" rx="5" ry="4.5" fill="url(#craterGrad)" opacity="0.8"/>
  <ellipse cx="55.5" cy="39.5" rx="2.5" ry="2" fill="#3A2010" opacity="0.55"/>

  <ellipse cx="26" cy="52" rx="4" ry="3.5" fill="url(#craterGrad)" opacity="0.75"/>
  <ellipse cx="26" cy="51.5" rx="2" ry="1.5" fill="#3A2010" opacity="0.5"/>

  <ellipse cx="46" cy="58" rx="3.5" ry="3" fill="url(#craterGrad)" opacity="0.7"/>

  <!-- Highlight (light source top-left) -->
  <ellipse cx="28" cy="22" rx="10" ry="8" fill="#E8C48A" opacity="0.25"/>
  <ellipse cx="25" cy="20" rx="5" ry="4" fill="#F5DEB3" opacity="0.2"/>

  <!-- Edge darkening -->
  <path d="M40,6 C52,5 62,10 68,20 C75,31 74,45 68,55 C62,65 50,73 38,72 C26,71 16,63 11,52 C5,40 7,25 15,16 C22,8 30,7 40,6Z"
        fill="none" stroke="#3A2010" stroke-width="2" opacity="0.5"/>
</svg>
