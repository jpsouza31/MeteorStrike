<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="meteorGrad" cx="40%" cy="60%" r="65%">
      <stop offset="0%" stop-color="#D4A96A"/>
      <stop offset="30%" stop-color="#A0714A"/>
      <stop offset="65%" stop-color="#7A4F2E"/>
      <stop offset="100%" stop-color="#4A2E14"/>
    </radialGradient>
    <radialGradient id="craterGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#5C3A1E"/>
      <stop offset="100%" stop-color="#3A2010"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#FF6600" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Main rock body - third silhouette variant -->
  <path d="M38,7 C50,6 61,11 67,22 C74,33 72,48 65,58 C58,67 44,73 32,71 C20,69 11,60 7,48 C3,36 6,21 15,13 C23,6 28,8 38,7Z"
        fill="url(#meteorGrad)" filter="url(#glow)"/>

  <!-- Rock surface texture - shifted again -->
  <path d="M22,18 C26,15 33,16 33,21 C29,21 23,21 22,18Z" fill="#5C3A1E" opacity="0.7"/>
  <path d="M14,40 C12,34 17,29 21,31 C19,35 15,40 14,40Z" fill="#5C3A1E" opacity="0.6"/>
  <path d="M52,58 C56,55 62,58 60,63 C56,62 51,62 52,58Z" fill="#4A2E14" opacity="0.7"/>
  <path d="M60,30 C65,28 69,33 66,37 C62,36 58,33 60,30Z" fill="#4A2E14" opacity="0.6"/>
  <path d="M28,62 C31,59 37,60 37,65 C33,65 28,65 28,62Z" fill="#5C3A1E" opacity="0.65"/>

  <!-- Craters - third rotation position -->
  <ellipse cx="24" cy="30" rx="7" ry="6" fill="url(#craterGrad)" opacity="0.85"/>
  <ellipse cx="25" cy="29" rx="4" ry="3.5" fill="#3A2010" opacity="0.6"/>
  <ellipse cx="26" cy="28" rx="2" ry="1.5" fill="#7A5030" opacity="0.4"/>

  <ellipse cx="52" cy="30" rx="5" ry="4.5" fill="url(#craterGrad)" opacity="0.8"/>
  <ellipse cx="52.5" cy="29.5" rx="2.5" ry="2" fill="#3A2010" opacity="0.55"/>

  <ellipse cx="40" cy="56" rx="4" ry="3.5" fill="url(#craterGrad)" opacity="0.75"/>
  <ellipse cx="40" cy="55.5" rx="2" ry="1.5" fill="#3A2010" opacity="0.5"/>

  <ellipse cx="58" cy="46" rx="3.5" ry="3" fill="url(#craterGrad)" opacity="0.7"/>

  <!-- Highlight (light source bottom-center this frame) -->
  <ellipse cx="40" cy="56" rx="12" ry="9" fill="#E8C48A" opacity="0.2"/>
  <ellipse cx="40" cy="58" rx="6" ry="4" fill="#F5DEB3" opacity="0.18"/>

  <!-- Edge -->
  <path d="M38,7 C50,6 61,11 67,22 C74,33 72,48 65,58 C58,67 44,73 32,71 C20,69 11,60 7,48 C3,36 6,21 15,13 C23,6 28,8 38,7Z"
        fill="none" stroke="#3A2010" stroke-width="2" opacity="0.5"/>
</svg>
