<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="25%" stop-color="#FFF176" stop-opacity="1"/>
      <stop offset="55%" stop-color="#FF9800" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF3300" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6600" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#FF2200" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#880000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer smoke ring -->
  <ellipse cx="50" cy="50" rx="42" ry="40" fill="#AA5500" opacity="0.18" filter="url(#blur1)"/>

  <!-- Spike rays - jagged burst -->
  <polygon points="50,50 44,18 50,28 56,18" fill="#FF6600" opacity="0.9"/>
  <polygon points="50,50 72,22 66,32 76,26" fill="#FF8800" opacity="0.85"/>
  <polygon points="50,50 82,38 72,44 84,48" fill="#FF6600" opacity="0.9"/>
  <polygon points="50,50 82,62 72,58 80,68" fill="#FF7700" opacity="0.85"/>
  <polygon points="50,50 66,80 58,70 62,82" fill="#FF6600" opacity="0.9"/>
  <polygon points="50,50 38,82 42,70 34,78" fill="#FF8800" opacity="0.85"/>
  <polygon points="50,50 18,64 28,56 16,52" fill="#FF6600" opacity="0.9"/>
  <polygon points="50,50 20,36 30,44 18,42" fill="#FF7700" opacity="0.85"/>

  <!-- Diagonal shorter spikes -->
  <polygon points="50,50 60,20 57,30 63,22" fill="#FFAA00" opacity="0.75"/>
  <polygon points="50,50 78,42 68,46 80,54" fill="#FFAA00" opacity="0.75"/>
  <polygon points="50,50 56,80 52,70 58,78" fill="#FFAA00" opacity="0.75"/>
  <polygon points="50,50 22,54 32,52 20,46" fill="#FFAA00" opacity="0.75"/>

  <!-- Rock debris chunks -->
  <polygon points="36,20 42,16 44,24 38,26" fill="#7A4F2E" opacity="0.9"/>
  <polygon points="68,18 74,22 70,28 64,24" fill="#6A3F1E" opacity="0.85"/>
  <polygon points="78,58 84,54 86,62 80,64" fill="#7A4F2E" opacity="0.9"/>
  <polygon points="20,62 16,56 24,54 26,60" fill="#6A3F1E" opacity="0.85"/>
  <polygon points="54,84 60,80 62,88 56,90" fill="#7A4F2E" opacity="0.9"/>
  <polygon points="28,28 22,34 28,38 34,32" fill="#6A3F1E" opacity="0.8"/>

  <!-- Small sparks -->
  <circle cx="46" cy="14" r="2" fill="#FFE000" opacity="0.95"/>
  <circle cx="76" cy="32" r="1.5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="80" cy="66" r="2" fill="#FFE000" opacity="0.9"/>
  <circle cx="28" cy="74" r="1.5" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="18" cy="44" r="2" fill="#FFE000" opacity="0.9"/>
  <circle cx="62" cy="86" r="1.5" fill="#FFFFFF" opacity="0.85"/>

  <!-- Mid flame blobs -->
  <ellipse cx="50" cy="50" rx="28" ry="26" fill="url(#outerGrad)" filter="url(#glow)"/>

  <!-- Bright core -->
  <ellipse cx="50" cy="50" rx="16" ry="15" fill="url(#coreGrad)" filter="url(#glow)"/>

  <!-- White hot center -->
  <ellipse cx="50" cy="50" rx="7" ry="6" fill="#FFFFFF" opacity="0.95"/>
</svg>
