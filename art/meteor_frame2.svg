<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="meteorGrad" cx="55%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#D4A96A"/>
      <stop offset="30%" stop-color="#A0714A"/>
      <stop offset="65%" stop-color="#7A4F2E"/>
      <stop offset="100%" stop-color="#4A2E14"/>
    </radialGradient>
    <radialGradient id="craterGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#5C3A1E"/>
      <stop offset="100%" stop-color="#3A2010"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#FF6600" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Main rock body - slightly different silhouette -->
  <path d="M42,7 C54,7 64,13 69,23 C75,34 73,48 66,57 C59,66 46,72 34,70 C22,68 13,59 9,48 C4,36 8,22 17,14 C25,7 32,7 42,7Z"
        fill="url(#meteorGrad)" filter="url(#glow)"/>

  <!-- Rock surface texture - shifted for rotation feel -->
  <path d="M48,14 C53,13 58,17 57,21 C53,20 48,19 48,14Z" fill="#5C3A1E" opacity="0.7"/>
  <path d="M60,32 C65,31 68,36 65,40 C61,38 57,36 60,32Z" fill="#5C3A1E" opacity="0.6"/>
  <path d="M30,60 C27,55 32,51 36,53 C34,57 31,61 30,60Z" fill="#4A2E14" opacity="0.7"/>
  <path d="M18,38 C16,33 20,28 24,30 C22,34 19,38 18,38Z" fill="#4A2E14" opacity="0.65"/>
  <path d="M42,62 C46,60 51,62 50,67 C46,66 41,66 42,62Z" fill="#5C3A1E" opacity="0.6"/>

  <!-- Craters - rotated positions -->
  <ellipse cx="50" cy="24" rx="7" ry="6" fill="url(#craterGrad)" opacity="0.85"/>
  <ellipse cx="51" cy="23" rx="4" ry="3.5" fill="#3A2010" opacity="0.6"/>
  <ellipse cx="52" cy="22" rx="2" ry="1.5" fill="#7A5030" opacity="0.4"/>

  <ellipse cx="30" cy="35" rx="5" ry="4.5" fill="url(#craterGrad)" opacity="0.8"/>
  <ellipse cx="30.5" cy="34.5" rx="2.5" ry="2" fill="#3A2010" opacity="0.55"/>

  <ellipse cx="54" cy="52" rx="4" ry="3.5" fill="url(#craterGrad)" opacity="0.75"/>
  <ellipse cx="54" cy="51.5" rx="2" ry="1.5" fill="#3A2010" opacity="0.5"/>

  <ellipse cx="28" cy="56" rx="3.5" ry="3" fill="url(#craterGrad)" opacity="0.7"/>

  <!-- Highlight (light source top-right this frame) -->
  <ellipse cx="52" cy="22" rx="10" ry="8" fill="#E8C48A" opacity="0.25"/>
  <ellipse cx="55" cy="20" rx="5" ry="4" fill="#F5DEB3" opacity="0.2"/>

  <!-- Edge -->
  <path d="M42,7 C54,7 64,13 69,23 C75,34 73,48 66,57 C59,66 46,72 34,70 C22,68 13,59 9,48 C4,36 8,22 17,14 C25,7 32,7 42,7Z"
        fill="none" stroke="#3A2010" stroke-width="2" opacity="0.5"/>
</svg>
